<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>遠志家族旅遊通</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="遠志家族旅遊通">
<meta name="theme-color" content="#1F3864">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231F3864'/%3E%3Ctext x='50' y='62' font-size='44' text-anchor='middle'%3E%F0%9F%87%A8%F0%9F%87%AD%3C/text%3E%3C/svg%3E">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#EEF2F6}</style>
</head>
<body>
<div id="root"></div>
<div id="gate" style="position:fixed;inset:0;background:linear-gradient(rgba(31,56,100,.88),rgba(31,56,100,.88)),url('https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Matterhorn_from_Domh%C3%BCtte_-_2.jpg/640px-Matterhorn_from_Domh%C3%BCtte_-_2.jpg') center/cover;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-family:'PingFang TC','Microsoft JhengHei',sans-serif;padding:24px">
  <div style="font-size:44px;margin-bottom:6px">🇨🇭</div>
  <div style="color:#fff;font-size:22px;font-weight:800;margin-bottom:2px">遠志家族旅遊通</div>
  <div style="color:#AEBBCC;font-size:13px;margin-bottom:18px">選擇你是誰,輸入家庭通行碼</div>
  <select id="gwho" style="font-size:16px;padding:10px 14px;border:none;border-radius:10px;width:220px;text-align:center;margin-bottom:10px">
    <option>遠志(爸)</option><option>妃霏(媽)</option><option>紹懷</option><option>熙妍</option><option>奶奶</option>
  </select>
  <input id="gpw" type="password" inputmode="numeric" autocomplete="off"
    style="font-size:18px;padding:11px 16px;border:none;border-radius:10px;width:220px;text-align:center;letter-spacing:4px" placeholder="通行碼" />
  <button id="gbtn" style="margin-top:12px;background:#C8102E;color:#fff;border:none;border-radius:10px;padding:12px 30px;font-size:16px;font-weight:800">進入</button>
  <div id="gerr" style="color:#FF9AA2;font-size:13px;margin-top:10px;height:16px"></div>
</div>
<script>
(function(){
  var PW = "7777";
  function unlock(){ var g=document.getElementById("gate"); if(g) g.style.display="none"; }
  try{
    var u = localStorage.getItem("hub_user");
    if(u && sessionStorage.getItem("hub_gate_ok")==="1"){ unlock(); }
    else if(u){ document.getElementById("gwho").value = u; }
  }catch(e){}
  function tryPw(){
    var v=(document.getElementById("gpw").value||"").trim();
    var w=document.getElementById("gwho").value;
    if(v===PW){
      try{ localStorage.setItem("hub_user", w); sessionStorage.setItem("hub_gate_ok","1"); }catch(e){}
      unlock();
    } else { document.getElementById("gerr").textContent="通行碼錯誤,請再試一次"; }
  }
  document.getElementById("gbtn").addEventListener("click",tryPw);
  document.getElementById("gpw").addEventListener("keydown",function(e){ if(e.key==="Enter") tryPw(); });
})();
</script>
